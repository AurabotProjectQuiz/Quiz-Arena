<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Quiz Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <section class="screen screen--top">
    <div style="display:flex;justify-content:space-between;align-items:center;width:100%;max-width:480px;">
      <h1 class="display" style="font-size:24px;">Admin</h1>
      <button class="muted-link" id="btn-sign-out" style="background:none;">Sign out</button>
    </div>

    <div class="card">
      <span class="eyebrow">Create a teacher account</span>
      <div class="field">
        <label for="input-teacher-email">Email</label>
        <input id="input-teacher-email" type="email" autocomplete="off" />
      </div>
      <div class="field" style="margin-bottom:0;">
        <label for="input-teacher-password">Temporary password</label>
        <input id="input-teacher-password" type="text" autocomplete="off" placeholder="At least 8 characters" />
      </div>
      <button class="btn btn--lime" id="btn-create-teacher" style="margin-top:20px;">
        Create teacher account
      </button>
      <p class="error-text" id="create-error" style="margin-top:10px;"></p>
      <p class="center-text" id="create-success" style="margin-top:10px;color:var(--lime);"></p>
    </div>

    <div class="card">
      <span class="eyebrow">Teacher accounts</span>
      <div id="teacher-list">Loading…</div>
    </div>

    <a href="/host.html" class="btn btn--lime" style="max-width:280px;text-decoration:none;text-align:center;">
      Host a game
    </a>
    <a href="/manage.html" class="btn btn--ghost" style="max-width:280px;text-decoration:none;text-align:center;">
      Manage quizzes
    </a>
  </section>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
